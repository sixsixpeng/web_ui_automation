# 自动化测试框架全局配置
# 通过环境变量 TEST_ENV 切换环境，默认使用 dev

base:
  # 日志配置
  log_level: INFO
  log_dir: ../log
  # 日志格式配置
  log_formats:
    console: "%(asctime)s | %(levelname)-8s | %(module)-15s | %(name)-25s | %(message)s"
    file: "%(asctime)s | %(levelname)-8s | %(module)-15s | %(name)-25s | %(filename)s:%(lineno)d | %(message)s"
  # 日志颜色配置（控制台）
  log_colors:
    DEBUG: "cyan"
    INFO: "green"
    WARNING: "yellow"
    ERROR: "red"
    CRITICAL: "bold_red"
  # 模块特定日志级别
  log_modules:
    test: INFO
    api: INFO
    browser: INFO
    element: DEBUG
    performance: INFO
    playwright: WARNING
    urllib3: WARNING
    selenium: WARNING
  # 日志文件配置
  log_file_max_size: 10485760  # 10MB
  log_file_backup_count: 5
  # 控制台日志输出
  console_log_enabled: true
  console_log_level: INFO
  # 文件日志输出
  file_log_enabled: true
  file_log_level: DEBUG
  
  screenshot_dir: ../screenshot
  report_dir: ../report
  playwright_cache_dir: ../playwright_cache

  # 浏览器配置
  browser_type: chromium  # chromium, firefox, webkit, chrome, edge
  headless: false
  viewport: { width: 1920, height: 1080 }
  slow_mo: 100  # 操作延迟（毫秒），调试时可增大
  timeout: 30000  # 默认超时时间（毫秒）
  # 浏览器可执行文件路径（可选）
  # browser_executable_path: "C:\\Program Files\\Google\\Chrome\\Application\\chrome.exe"

  # 测试数据配置
  data_dir: ../test_data

# 开发环境
dev:
  base_url: "https://dev.example.com"
  api_base_url: "https://dev-api.example.com"
  username: "test_user"
  password: "test_pass"

# 测试环境
staging:
  base_url: "https://staging.example.com"
  api_base_url: "https://staging-api.example.com"
  username: "staging_user"
  password: "staging_pass"

# 生产环境（谨慎使用）
prod:
  base_url: "https://example.com"
  api_base_url: "https://api.example.com"
  username: "prod_user"
  password: "prod_pass"