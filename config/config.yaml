# ============================================================
# Web UI Automation Framework - 全局配置
# ============================================================

run:
  mode: sync
  env: test
  browser: chromium
  headless: false
  workers: 4

step_delay_ms: 100             # 步骤间延时（毫秒），>0 可减缓执行速度用于调试
timeout:
  default: 30000
  page_load: 60000
  element: 10000
  assertion: 5000

browser:
  viewport:
    width: 1920
    height: 1080
  args:
    - --disable-blink-features=AutomationControlled
    - --disable-dev-shm-usage
  proxy:
    enabled: true
    server: ""
    username: ""
    password: ""

async:
  default_concurrency: 5
  max_concurrency: 10
  auto_control: true

allure:
  raw_data_path: reports/allure/raw
  static_report_path: reports/allure/static
  auto_generate_static: true
  attach_static_zip_to_mail:
  strategy: fail
  timeout: 30
  retry_times: 2
  zip_screenshots: true
  zip_logs: true

logging:
  level: DEBUG
  file:
    enabled: true
    max_size_mb: 500
  keep_days: 7
  format: "%(asctime)s | %(levelname)-8s | %(name)s | %(process)d | %(filename)s:%(lineno)d | %(message)s"
  enable_desensitization: true

screenshot:
  save_dir: screenshots
  enable_url_overlay: true
  image_format: png
  cleanup_days: 7
  auto_attach_allure: true

mail:
  prefix: "[Web Automation]"
  strategy: fail
  timeout: 30
  retry_times: 2
  zip_screenshots: true
  zip_logs: true

retry:
  max_retry_times: 3
  retry_interval_ms: 500
  retryable_exceptions:
    - TimeoutError
    - ElementNotVisibleError
    - ElementNotInteractableError
    - StaleElementReferenceError
    - NetworkError

performance:
  enabled: true
  lcp_threshold_ms: 2500
  load_threshold_ms: 5000
  collect_resource_details: true

network:
  intercept_enabled: true
  filter_static: true
  max_cache_count: 200
  capture_request_body: true
  capture_response_body: true

environments:
  dev:
    base_url: https://dev.example.com
    description: 开发环境
  test:
    base_url: https://test.example.com
    description: 测试环境
  pre:
    base_url: https://pre.example.com
    description: 预发布环境
  prod:
    base_url: https://example.com
    description: 生产环境

# 数据库
database:
  host: localhost
  port: 3306
  user: root
  password: root
  name: test_db

# 万能验证码（测试环境使用，跳过验证码识别）
universal_captcha: "0000"

# Faker 随机种子（设值后可复现随机数据）
faker_seed: ""
