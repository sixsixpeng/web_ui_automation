[tool:pytest]
# 测试用例搜索路径
testpaths = test_case
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 测试执行配置
addopts = 
    -v
    # --strict-markers  # 暂时禁用严格标记检查
    --tb=short
    --reruns 2
    --reruns-delay 1
    --alluredir=report/allure_raw
    --clean-alluredir

# 标记定义
markers =
    ui: UI 自动化测试
    api: API 接口测试
    smoke: 冒烟测试
    regression: 回归测试
    performance: 性能测试
    security: 安全测试
    integration: 集成测试
    demo: 演示测试
    slow: 慢速测试（需要更多时间）
    flaky: 不稳定的测试
    skip: 跳过测试
    windows: 仅 Windows 平台
    linux: 仅 Linux 平台
    macos: 仅 macOS 平台

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 并行执行配置（通过 -n auto 启用）
# xdist_worker_count = auto

# 超时配置（通过 pytest-timeout 插件）
timeout = 300
timeout_method = thread

# 报告配置
junit_suite_name = Web UI Automation Tests
junit_logging = all